<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1 class="title">오늘 할 일</h1>

    <div class="input-row">
      <input
        type="text"
        id="todoInput"
        class="todo-input"
        placeholder="할 일을 입력하세요..."
        autocomplete="off"
      />
      <button id="addBtn" class="add-btn">추가</button>
    </div>

    <div class="filters">
      <button class="filter-btn active" data-filter="all">전체</button>
      <button class="filter-btn" data-filter="active">진행 중</button>
      <button class="filter-btn" data-filter="completed">완료</button>
    </div>

    <ul id="todoList" class="todo-list"></ul>

    <div class="footer">
      <span id="remainCount">0개 남음</span>
      <button id="clearBtn" class="clear-btn">완료 항목 삭제</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
